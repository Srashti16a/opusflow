services:
  - type: web
    name: eventhub360-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node scripts/create-db-components.js && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eventhub360-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: eventhub360-db
    databaseName: eventhub360
    user: postgres
    plan: free
