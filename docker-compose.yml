version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: isoftzone_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: post1234
      POSTGRES_DB: loginapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d loginapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: isoftzone_backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:post1234@db:5432/loginapp?schema=public
      - PORT=5000
      - JWT_SECRET=mysecretkey
      - JWT_REFRESH_SECRET=myrefreshsecretkey
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push && node scripts/create-db-components.js && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: isoftzone_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
